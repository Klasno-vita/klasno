services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-klasno}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-klasno}
      POSTGRES_DB: ${POSTGRES_DB:-klasno}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-klasno} -d ${POSTGRES_DB:-klasno}"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
